<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Boalkhali Go | Register

</title><link
rel="stylesheet"
href="../css/components.css"><link
rel="stylesheet"
href="../css/auth.css"><link
rel="stylesheet"
href="../css/responsive.css"></head><body class="auth-page"><div class="auth-card"><div class="auth-logo"><h1>Boalkhali Go

</h1><p>Create New Account

</p></div><div
class="auth-error"
id="errorBox">
</div><div
class="auth-success"
id="successBox">
</div><form
id="registerForm"
class="auth-form"><div><label>Full Name

</label><input
type="text"
class="input"
id="name"
required>

</div><div><label>Email Address

</label><input
type="email"
class="input"
id="email"
required>

</div><div><label>Phone Number

</label><input
type="tel"
class="input"
id="phone"
required>

</div><div><label>Password

</label><input
type="password"
class="input"
id="password"
required>

</div><div><label>Role

</label><select
id="role"
class="select">

<option value="rider">Rider

</option><option value="driver">Driver

</option></select></div><!-- Driver Section --><div
id="driverFields"
style="display:none;"><div><label>Vehicle Type

</label><input
type="text"
class="input"
id="vehicleType">

</div><div><label>Vehicle Number

</label><input
type="text"
class="input"
id="vehicleNumber">

</div><div><label>License Number

</label><input
type="text"
class="input"
id="licenseNumber">

</div><div><label>NID Number

</label><input
type="text"
class="input"
id="nidNumber">

</div><div><label>Profile Photo URL

</label><input
type="url"
class="input"
id="photoURL">

</div><div
style="
text-align:center;
margin-top:15px;
"><img
id="photoPreview"
src=""
alt="Preview"
style="
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
display:none;
">

</div></div><button
type="submit"
class="auth-btn">

Create Account

</button></form><div class="auth-link">Already have an account?

<a href="login.html">Login

</a></div></div><script
type="module"
src="../js/auth.js">
</script></body></html>
