<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Boalkhali Go | Driver Dashboard

</title><link
rel="stylesheet"
href="../css/components.css"><link
rel="stylesheet"
href="../css/driver.css"><link

href="../css/responsive.css"></head><body class="driver-page"><nav class="navbar"><h2>Boalkhali Go Driver

</h2><button
id="logoutBtn"
class="btn btn-danger">

Logout

</button></nav><div class="driver-container"><!-- Hero --><section class="driver-hero"><h1>Driver Dashboard

</h1><p>Manage rides, earnings and profile

</p></section><!-- Statistics --><div class="driver-grid"><div class="driver-stat"><h4>Today's Trips

</h4><p id="todayTrips">0

</p></div><div class="driver-stat"><h4>Completed Trips

</h4><p id="completedTrips">0

</p></div><div class="driver-stat"><h4>Total Earnings

</h4><p
id="earnings"
class="earnings-value">৳0

</p></div></div><!-- Online Status --><div class="status-card"><h3>Driver Status

</h3><br><span

Offline

</span><br><br>

<button

class="btn btn-primary">

Go Online

</button></div><br><!-- Ride Requests --><section class="requests-section"><h2>Available Ride Requests

</h2><div id="rideRequests"><div class="no-rides">No Ride Requests

</div></div></section><!-- Accepted Rides --><section class="accepted-section"><h2>Accepted Rides

</h2><div id="acceptedRides"><div class="no-rides">No Accepted Rides

</div></div></section><!-- Driver Profile --><section class="driver-profile"><div class="profile-top"><img

<div class="driver-info"><h2 id="driverName">Loading...

</h2><p>Verified Driver

</p></div></div><div class="profile-grid"><div class="profile-group"><label>Vehicle Type

</label><input
type="text"
id="vehicleType">

</div><div class="profile-group"><label>Vehicle Number

</label><input
type="text"
id="vehicleNumber">

</div><div class="profile-group"><label>License Number

</label><input
type="text"
id="licenseNumber">

</div><div class="profile-group"><label>NID Number

</label><input
type="text"
id="nidNumber">

</div><div class="profile-group"><label>Profile Photo URL

</label><input
type="url"
id="photoURL">

</div></div><button
id="saveProfileBtn"
class="save-profile-btn">

Save Profile

</button></section></div><script
type="module"
src="../js/driver.js">
</script></body></html>
